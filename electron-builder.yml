# ==========================================
# electron-builder 打包配置
# ==========================================

appId: com.vigosss.video-editor-ai
productName: 老兵AI智剪
copyright: Copyright © 2024 vigosss

# 目录配置
directories:
  output: out
  buildResources: build

# 需要打包的文件
files:
  - dist-electron/**/*
  - package.json
  # 排除 FFmpeg npm 包（通过 extraResources 单独打包二进制）
  - "!node_modules/@ffmpeg-installer/**/*"
  - "!node_modules/ffprobe-static/**/*"

# 额外资源：FFmpeg 二进制文件
extraResources:
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"

# 原生模块自动重建
npmRebuild: true

# ==========================================
# macOS 配置
# ==========================================
mac:
  icon: build/logo.png
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  extendInfo:
    NSMicrophoneUsageDescription: "需要访问麦克风以进行语音识别"
    NSCameraUsageDescription: "需要访问摄像头以录制视频"
    CFBundleShortVersionString: "${version}"

# DMG 安装镜像配置
dmg:
  background: null
  backgroundColor: "#1E293B"
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

# ==========================================
# Windows 配置
# ==========================================
win:
  icon: build/logo.png
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装器配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/logo.png
  uninstallerIcon: build/logo.png
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 老兵AI智剪

# ==========================================
# 发布配置（GitHub Releases）
# ==========================================
publish:
  provider: github
  owner: vigosss
  repo: video-editor-ai